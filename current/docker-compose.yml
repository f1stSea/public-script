networks:
  1panel-network:
    external: true

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: current-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: current
      POSTGRES_USER: current
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=2MB
      -c maintenance_work_mem=16MB
      -c max_connections=20
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-127.0.0.1:5432}:5432"
    networks:
      - 1panel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U current"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    image: ghcr.io/f1stsea/current-backend:latest
    container_name: current-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://current:${DB_PASSWORD}@current-db:5432/current
      SYNC_DATABASE_URL: postgresql://current:${DB_PASSWORD}@current-db:5432/current
      SECRET_KEY: ${SECRET_KEY}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY:-}
      LONGBRIDGE_APP_KEY: ${LONGBRIDGE_APP_KEY:-}
      LONGBRIDGE_APP_SECRET: ${LONGBRIDGE_APP_SECRET:-}
      LONGBRIDGE_ACCESS_TOKEN: ${LONGBRIDGE_ACCESS_TOKEN:-}
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8000}:8000"
    networks:
      - 1panel-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 300M

  frontend:
    image: ghcr.io/f1stsea/current-frontend:latest
    container_name: current-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3199}:80"
    networks:
      - 1panel-network
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
